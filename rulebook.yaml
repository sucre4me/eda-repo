---
- name: Demo Event Trigger
  hosts: all
  sources:
    - ansible.eda.webhook:
        host: 0.0.0.0
        port: 5000

  rules:
    - name: Trigger Controller Job
      condition: event.payload.message == "run"
      action:
        run_job_template:
          name: "Demo Job Template"
          organization: "Default"
          credential: eda credential
