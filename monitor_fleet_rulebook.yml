---
- name: Periodic /var Capacity Monitor
  hosts: all
  sources:
    - ansible.eda.range:
        limit: 1        # Trigger once per interval
        delay: 300      # Wait 5 minutes between runs
  rules:
    - name: Execute Fleet Scan
      condition: event.i == 0
      action:
        run_job_template:
          name: "Fleet Var Cleanup"  # This MUST match your Job Template name in AAP
          organization: "Default"
