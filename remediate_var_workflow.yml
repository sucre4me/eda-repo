- name: Fleet-wide /var/log Remediation
  hosts: all
  gather_facts: no
  tasks:
    - name: Get /var/log usage percentage
      ansible.builtin.shell: df /var/log | awk 'NR==2 {gsub(/%/,""); print $5}'
      register: varlog_usage
      changed_when: false

    - name: Show usage (debug)
      ansible.builtin.debug:
        msg: "Current /var/log usage is {{ varlog_usage.stdout }}%"

    - name: Null large log files if usage > 80%
      ansible.builtin.shell: |
        find /var/log -type f -size +100M -exec truncate -s 0 {} +
      when: varlog_usage.stdout | int > 80

    - name: Clear DNF/YUM cache if usage > 80%
      ansible.builtin.dnf:
        update_cache: yes
        clean_facts: yes
      when:
        - varlog_usage.stdout | int > 80
