# remediate_disk.yml
---
- name: Listen for Disk Alerts via Event Stream
  hosts: all
  sources:
    - ansible.eda.pg_listener:
        # No extra config needed; AAP handles the connection
  rules:
    - name: Cleanup /var/log when filesystem > 80%
      condition: 
        event.payload.alert.status == "firing" and
        event.payload.alert.labels.mountpoint == "/var/log"
      action:
        run_job_template:
          name: "Disk Cleanup Playbook"
          organization: "Default"
          job_args:
            extra_vars:
              target_host: "{{ event.payload.alert.labels.instance }}"
